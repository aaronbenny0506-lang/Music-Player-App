<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player-container">
    <div class="album-art">🎵</div>

    <div class="track-info">
      <h2 id="track-title">Loading Track...</h2>
      <p id="track-artist">Artist Name</p>
    </div>

    <audio id="audio-element"></audio>

    <div class="progress-container" id="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="time-stamps">
      <span id="current-time">0:00</span>
      <span id="total-duration">0:00</span>
    </div>

    <div class="controls">
      <button id="prev-btn" title="Previous">⏮</button>
      <button id="play-btn" class="play-main" title="Play">▶</button>
      <button id="next-btn" title="Next">⏭</button>
    </div>

    <div class="volume-container">
      <span>🔊</span>
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.7">
    </div>
  </div>

  
</body>
</html>
